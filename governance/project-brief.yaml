governance:
  problem_statement: >
    Las tiendas de suplementos, vitaminas y nutracéuticos en LATAM operan con
    sistemas genéricos que no manejan inventario con lotes, caducidades, FEFO,
    multi-sucursal y créditos. La información de inventario no es confiable,
    los faltantes son frecuentes y no hay trazabilidad de operaciones críticas.
    El mercado de suplementos crece aceleradamente y los dueños de tiendas
    necesitan un sistema que entienda su negocio.
  solution_proposal: >
    SaaS multiempresa especializado en suplementos. Backend 100% Supabase
    (sin servidor externo), frontend Next.js+React, operaciones críticas
    transaccionales vía Edge Functions → RPC SQL. Incluye inventario con
    lotes/caducidades/FEFO, compras, POS, caja, créditos, reportes y auditoría.
    Multiempresa por diseño con RLS.
  estado_actual_del_sistema: >
    MVP en etapa avanzada. Backend completo: 14 migrations de base de datos
    cubriendo companies, branches, profiles, catálogo, inventario, compras,
    clientes, caja, POS, créditos, devoluciones, dashboard y reportes.
    36 Edge Functions implementadas. Frontend Next.js con login, dashboard,
    POS y productos. Tests con Deno existentes.
  success_kpis:
    - kpi: "Tiempo para responder ¿cuánto vendí hoy?"
      meta: "< 1 minuto"
    - kpi: "Consistencia de inventario (físico vs sistema)"
      meta: "100% trazable"
    - kpi: "Disponibilidad del sistema"
      meta: "99.5%"
    - kpi: "Tiempo de operación POS (agregar producto + cobrar)"
      meta: "< 10 segundos"
  constraints:
    - constraint: "Sin backend externo — 100% Supabase en V1"
      tipo: tecnica
    - constraint: "Operaciones críticas SOLO vía Edge Functions + RPC transaccional"
      tipo: tecnica
    - constraint: "No se modifica stock directamente — siempre vía movimientos"
      tipo: negocio
    - constraint: "Multiempresa obligatorio — toda tabla operativa tiene company_id"
      tipo: arquitectura
    - constraint: "Consistencia > conveniencia — trazabilidad obligatoria"
      tipo: negocio
    - constraint: "No hay CFDI, pasarelas de pago ni catálogo global en MVP"
      tipo: alcance
    - constraint: "Usuario único desarrollador — priorizar módulos completos y verificables"
      tipo: operativa

