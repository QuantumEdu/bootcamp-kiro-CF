architecture_decisions:
  - id: "AD-001"
    titulo: "Supabase como plataforma única"
    contexto: "No hay backend externo — toda la lógica vive en Supabase (Auth, PostgreSQL, RLS, Edge Functions)."
    decision: "Usar Supabase como plataforma principal sin servidores externos en V1."
    consecuencias: "Dependencia total de Supabase. Edge Functions como única capa backend."
  - id: "AD-002"
    titulo: "Operaciones críticas vía Edge Functions + RPC SQL"
    contexto: "Operaciones que afectan dinero o inventario deben ser atómicas y trazables."
    decision: "Vue/Next.js → Edge Function → RPC SQL transaccional. El frontend nunca modifica datos críticos directamente."
    consecuencias: "Mayor latencia por saltos de red, pero consistencia garantizada."
  - id: "AD-003"
    titulo: "RLS como capa de seguridad multiempresa"
    contexto: "El aislamiento entre empresas es obligatorio y debe aplicarse en base de datos."
    decision: "Toda tabla operativa tiene company_id y RLS policies que filtran por el usuario autenticado."
    consecuencias: "Seguridad por defecto. No se puede filtrar datos de otra empresa aunque el frontend lo intente."
  - id: "AD-004"
    titulo: "Inventario basado en movimientos"
    contexto: "Nunca se modifica stock directamente — todo cambio debe ser explicable."
    decision: "Toda modificación de inventario genera un movimiento. No hay UPDATE directo a cantidad en existencia."
    consecuencias: "Trazabilidad completa. Consultas de stock requieren agregación de movimientos."
  - id: "AD-005"
    titulo: "Frontend migrado de Vue 3 a Next.js 16"
    contexto: "El proyecto inició con Vue 3 pero migró a Next.js 16 con React 19."
    decision: "Next.js 16 + React 19 + Tailwind CSS 4 + Supabase SSR."
    consecuencias: "Mejor DX, SSR/SSG disponible, pero rompió compatibilidad con Vue 3. El init original de SDD aún referencia Vue."
  - id: "AD-006"
    titulo: "FEFO como estrategia de consumo de inventario"
    contexto: "Productos con caducidad deben venderse antes de vencer."
    decision: "El POS consume lotes ordenados por fecha de caducidad ascendente (First Expired First Out)."
    consecuencias: "Reduce merma por caducidad. Complejidad adicional en la query de selección de lotes."
  - id: "AD-007"
    titulo: "Eliminación lógica en todas las entidades"
    contexto: "No se deben perder registros críticos."
    decision: "Usar is_active, deleted_at, deleted_by en todas las tablas operativas. No DELETE físico."
    consecuencias: "Base de datos más grande. Consultas siempre filtran por is_active o deleted_at IS NULL."

technical_requirements:
  - id: "TR-001"
    titulo: "Operaciones transaccionales atómicas"
    detalle: "Toda operación crítica (venta, compra, abono, ajuste) debe ejecutarse en una transacción SQL. COMMIT completo o ROLLBACK completo."
    criterio_verificacion: "Si falla cualquier paso intermedio, la operación completa se revierte sin dejar estado inconsistente."
  - id: "TR-002"
    titulo: "RLS en todas las tablas operativas"
    detalle: "Toda tabla con company_id debe tener RLS habilitado y políticas que filtren por el contexto del usuario autenticado."
    criterio_verificacion: "Usuario de empresa A no puede leer/escribir datos de empresa B aunque conozca IDs."
  - id: "TR-003"
    titulo: "Auditoría obligatoria en acciones críticas"
    detalle: "Ventas canceladas, devoluciones, descuentos, créditos, abonos, ajustes, cierres de caja, cambios de precio y permisos deben quedar auditados."
    criterio_verificacion: "Cada acción crítica tiene un registro en audit_logs con usuario, acción, entidad, old_data, new_data."
  - id: "TR-004"
    titulo: "Multiempresa por diseño"
    detalle: "Toda entidad operativa pertenece a una empresa. El company_id está presente en todas las tablas de datos transaccionales."
    criterio_verificacion: "No hay tabla operativa sin company_id. No hay query sin filtro por company_id."
  - id: "TR-005"
    titulo: "Existencia disponible vs física"
    detalle: "El sistema debe distinguir entre existencia física (real en almacén) y disponible (física - comprometida). POS vende contra disponible."
    criterio_verificacion: "Dashboard muestra ambos valores. POS rechaza venta si disponible < cantidad solicitada."
  - id: "TR-006"
    titulo: "Edge Functions validan todo"
    detalle: "Cada Edge Function debe validar: usuario autenticado, empresa, sucursal, rol, datos de entrada antes de ejecutar lógica."
    criterio_verificacion: "EF rechaza request sin auth, sin company_id válido, sin branch_id válido, sin rol suficiente."
  - id: "TR-007"
    titulo: "Preparación para AI-first"
    detalle: "El sistema debe exponer datos estructurados y APIs que permitan integrar modelos de AI para predicción de demanda, recomendaciones y automatización."
    criterio_verificacion: "Edge Functions existentes tienen contratos REST claros. Base de datos tiene datos históricos consultables para entrenamiento."

