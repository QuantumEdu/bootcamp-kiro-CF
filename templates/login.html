{{define "login.html"}}
<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — POS AI-First</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <!-- Branding -->
            <div class="text-center mb-8">
                <div class="mx-auto w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center mb-4">
                    <svg class="w-7 h-7 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">POS AI-First</h1>
                <p class="text-sm text-gray-500 mt-1">Punto de Venta Inteligente</p>
            </div>

            <!-- Error message -->
            {{if .Error}}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 text-center" role="alert">
                {{.Error}}
            </div>
            {{end}}

            <!-- Login form -->
            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label for="pin" class="block text-sm font-medium text-gray-700 mb-2">PIN de acceso</label>
                    <input
                        type="password"
                        id="pin"
                        name="pin"
                        maxlength="6"
                        inputmode="numeric"
                        pattern="[0-9]*"
                        placeholder="••••••"
                        autofocus
                        required
                        class="w-full text-center text-2xl tracking-widest px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors"
                    />
                </div>
                <button
                    type="submit"
                    class="w-full px-4 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors"
                >
                    Entrar
                </button>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
