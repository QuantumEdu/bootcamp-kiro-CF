{{define "content"}}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-gray-800">Clientes</h2>
        <a href="/clientes/new" class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nuevo Cliente
        </a>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        {{if .Clients}}
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">Nombre</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">Teléfono</th>
                    <th class="px-4 py-3 text-left font-medium text-gray-600">Dirección</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {{range .Clients}}
                <tr class="hover:bg-gray-50">
                    <td class="px-4 py-3 text-gray-800 font-medium">{{.Nombre}}</td>
                    <td class="px-4 py-3 text-gray-600">{{.Telefono}}</td>
                    <td class="px-4 py-3 text-gray-600">{{.Direccion}}</td>
                </tr>
                {{end}}
            </tbody>
        </table>
        {{else}}
        <div class="px-4 py-8 text-center text-gray-400">
            No hay clientes registrados
        </div>
        {{end}}
    </div>
</div>
{{end}}
