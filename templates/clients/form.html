{{define "content"}}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-gray-800">Nuevo Cliente</h2>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        {{if .Error}}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/clientes" class="space-y-4">
            <!-- Nombre -->
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    value="{{if .Input}}{{.Input.Nombre}}{{end}}"
                    required
                    class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
                    placeholder="Nombre del cliente"
                />
            </div>

            <!-- Teléfono -->
            <div>
                <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                <input
                    type="text"
                    id="telefono"
                    name="telefono"
                    value="{{if .Input}}{{.Input.Telefono}}{{end}}"
                    class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
                    placeholder="Número de teléfono"
                />
            </div>

            <!-- Dirección -->
            <div>
                <label for="direccion" class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                <input
                    type="text"
                    id="direccion"
                    name="direccion"
                    value="{{if .Input}}{{.Input.Direccion}}{{end}}"
                    class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
                    placeholder="Dirección del cliente"
                />
            </div>

            <!-- Actions -->
            <div class="flex gap-2 pt-2">
                <button
                    type="submit"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium transition-colors"
                >
                    Guardar
                </button>
                <a
                    href="/clientes"
                    class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium transition-colors"
                >
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{{end}}
