{{define "content"}}
<div class="space-y-4" x-data="salesCart()">
    <div class="flex items-center justify-between">
        <h2 class="text-xl font-bold text-gray-800">Nueva Venta</h2>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <input type="search" placeholder="Buscar producto por nombre o SKU..." x-model="search"
                       hx-get="/api/productos/buscar" hx-target="#product-results" hx-trigger="keyup changed delay:300ms" name="q"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                <div id="product-results" class="mt-3 space-y-1 max-h-64 overflow-y-auto"></div>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4">
                <h3 class="font-semibold text-gray-700 mb-3">Ventas recientes</h3>
                <div hx-get="/api/ventas/recientes" hx-trigger="load, ventaCreada from:body" hx-swap="innerHTML">
                    <div class="animate-pulse space-y-2"><div class="h-3 bg-gray-200 rounded w-full"></div><div class="h-3 bg-gray-200 rounded w-4/5"></div></div>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 flex flex-col">
            <h3 class="font-semibold text-gray-700 mb-3">Carrito <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-0.5 rounded-full" x-text="items.length + ' items'"></span></h3>
            <div class="flex-1 space-y-2 overflow-y-auto max-h-72">
                <template x-for="(item, index) in items" :key="index">
                    <div class="flex items-center gap-2 p-2 bg-gray-50 rounded-lg text-sm">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-800 truncate" x-text="item.nombre"></p>
                            <p class="text-xs text-gray-500">$<span x-text="item.precio.toFixed(2)"></span> x <span x-text="item.cantidad"></span></p>
                        </div>
                        <div class="flex items-center gap-1">
                            <button @click="decrementItem(index)" class="w-6 h-6 bg-gray-200 rounded text-xs font-bold hover:bg-gray-300">-</button>
                            <span class="w-6 text-center text-xs" x-text="item.cantidad"></span>
                            <button @click="incrementItem(index)" class="w-6 h-6 bg-gray-200 rounded text-xs font-bold hover:bg-gray-300">+</button>
                        </div>
                        <button @click="removeItem(index)" class="text-red-400 hover:text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </template>
                <div x-show="items.length === 0" class="text-center text-gray-400 py-8 text-sm">Agrega productos al carrito</div>
            </div>
            <div class="border-t border-gray-200 pt-3 mt-3 space-y-3">
                <div class="flex justify-between text-lg font-bold text-gray-900"><span>Total:</span><span>$<span x-text="total().toFixed(2)"></span></span></div>
                <select x-model="metodoPago" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    <option value="efectivo">Efectivo</option><option value="tarjeta">Tarjeta</option><option value="transferencia">Transferencia</option>
                </select>
                <button @click="checkout()" :disabled="items.length === 0"
                        :class="items.length === 0 ? 'bg-gray-300 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'"
                        class="w-full py-3 text-white rounded-lg font-medium transition-colors">Cobrar</button>
            </div>
        </div>
    </div>
</div>
{{end}}
