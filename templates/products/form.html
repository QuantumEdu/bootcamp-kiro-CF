{{define "products/form.html"}}
<form
    method="POST"
    action="{{if .IsEdit}}/productos/{{.Product.ID}}{{else}}/productos{{end}}"
    hx-post="{{if .IsEdit}}/productos/{{.Product.ID}}{{else}}/productos{{end}}"
    hx-target="{{if .IsEdit}}#product-{{.Product.ID}}{{else}}#product-list{{end}}"
    hx-swap="{{if .IsEdit}}outerHTML{{else}}afterbegin{{end}}"
    class="space-y-4 p-4 bg-white rounded-xl shadow-sm border border-gray-100"
>
    <h3 class="text-lg font-bold text-gray-800">
        {{if .IsEdit}}Editar Producto{{else}}Nuevo Producto{{end}}
    </h3>

    <!-- Error display area -->
    <div id="form-errors"></div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Nombre -->
        <div>
            <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
            <input
                type="text"
                id="nombre"
                name="nombre"
                value="{{.Product.Nombre}}"
                required
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- SKU -->
        <div>
            <label for="sku" class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
            <input
                type="text"
                id="sku"
                name="sku"
                value="{{.Product.SKU}}"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- Precio Venta -->
        <div>
            <label for="precio_venta" class="block text-sm font-medium text-gray-700 mb-1">Precio venta *</label>
            <input
                type="number"
                id="precio_venta"
                name="precio_venta"
                value="{{printf "%.2f" .Product.PrecioVenta}}"
                step="0.01"
                min="0.01"
                required
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- Precio Compra -->
        <div>
            <label for="precio_compra" class="block text-sm font-medium text-gray-700 mb-1">Precio compra</label>
            <input
                type="number"
                id="precio_compra"
                name="precio_compra"
                value="{{printf "%.2f" .Product.PrecioCompra}}"
                step="0.01"
                min="0"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- Stock Actual -->
        <div>
            <label for="stock_actual" class="block text-sm font-medium text-gray-700 mb-1">Stock actual</label>
            <input
                type="number"
                id="stock_actual"
                name="stock_actual"
                value="{{printf "%.0f" .Product.StockActual}}"
                step="0.01"
                min="0"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- Stock Mínimo -->
        <div>
            <label for="stock_minimo" class="block text-sm font-medium text-gray-700 mb-1">Stock mínimo</label>
            <input
                type="number"
                id="stock_minimo"
                name="stock_minimo"
                value="{{printf "%.0f" .Product.StockMinimo}}"
                step="0.01"
                min="0"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>

        <!-- Unidad -->
        <div>
            <label for="unidad" class="block text-sm font-medium text-gray-700 mb-1">Unidad</label>
            <select
                id="unidad"
                name="unidad"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            >
                <option value="unidad" {{if eq (printf "%s" .Product.Unidad) "unidad"}}selected{{end}}>Unidad</option>
                <option value="kg" {{if eq (printf "%s" .Product.Unidad) "kg"}}selected{{end}}>Kg</option>
                <option value="litro" {{if eq (printf "%s" .Product.Unidad) "litro"}}selected{{end}}>Litro</option>
                <option value="paquete" {{if eq (printf "%s" .Product.Unidad) "paquete"}}selected{{end}}>Paquete</option>
            </select>
        </div>

        <!-- Categoría ID -->
        <div>
            <label for="categoria_id" class="block text-sm font-medium text-gray-700 mb-1">Categoría ID</label>
            <input
                type="number"
                id="categoria_id"
                name="categoria_id"
                value="{{.Product.CategoriaID}}"
                min="0"
                class="w-full rounded-lg border-gray-300 shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm p-2 border"
            />
        </div>
    </div>

    <!-- Actions -->
    <div class="flex gap-2 pt-2">
        <button
            type="submit"
            class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium transition-colors"
        >
            Guardar
        </button>
        <button
            type="button"
            onclick="document.getElementById('product-form-area').innerHTML=''"
            class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 text-sm font-medium transition-colors"
        >
            Cancelar
        </button>
    </div>
</form>
{{end}}
