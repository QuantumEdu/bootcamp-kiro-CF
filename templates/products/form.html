{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <button hx-get="/productos" hx-target="#main-content" class="text-gray-400 hover:text-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <h2 class="text-xl font-bold text-gray-800">{{if .Product.ID}}Editar{{else}}Nuevo{{end}} Producto</h2>
    </div>

    <form hx-post="/productos" hx-target="#main-content"
          class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-4">
        {{if .Product.ID}}
        <input type="hidden" name="id" value="{{.Product.ID}}">
        {{end}}

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                <input type="text" name="nombre" value="{{.Product.Nombre}}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
                <input type="text" name="sku" value="{{.Product.SKU}}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Precio Venta *</label>
                <input type="number" name="precio_venta" value="{{.Product.PrecioVenta}}" step="0.01" min="0" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Precio Compra</label>
                <input type="number" name="precio_compra" value="{{.Product.PrecioCompra}}" step="0.01" min="0"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Categoria</label>
                <select name="categoria_id"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                    <option value="">Sin categoria</option>
                    {{range .Categories}}
                    <option value="{{.ID}}">{{.Nombre}}</option>
                    {{end}}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Stock Actual</label>
                <input type="number" name="stock_actual" value="{{.Product.StockActual}}" step="0.01"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Stock Minimo</label>
                <input type="number" name="stock_minimo" value="{{.Product.StockMinimo}}" step="0.01"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Unidad</label>
            <select name="unidad"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none">
                <option value="unidad" {{if eq .Product.Unidad "unidad"}}selected{{end}}>Unidad</option>
                <option value="kg" {{if eq .Product.Unidad "kg"}}selected{{end}}>Kilogramo</option>
                <option value="litro" {{if eq .Product.Unidad "litro"}}selected{{end}}>Litro</option>
                <option value="paquete" {{if eq .Product.Unidad "paquete"}}selected{{end}}>Paquete</option>
            </select>
        </div>

        <div class="flex justify-end gap-3 pt-4">
            <button type="button" hx-get="/productos" hx-target="#main-content"
                    class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
                Cancelar
            </button>
            <button type="submit"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700 transition-colors">
                {{if .Product.ID}}Guardar Cambios{{else}}Crear Producto{{end}}
            </button>
        </div>
    </form>
</div>
{{end}}
