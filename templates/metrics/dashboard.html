{{define "content"}}
<div class="space-y-6">
    <!-- Row 1: Sales summary cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Ventas hoy -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-hoy" hx-trigger="load, every 30s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-20 mb-3"></div>
                <div class="h-8 bg-gray-200 rounded w-32"></div>
            </div>
        </div>

        <!-- Ventas semana con sparkline -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-sparkline" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-24 mb-3"></div>
                <div class="h-12 bg-gray-200 rounded w-full"></div>
            </div>
        </div>

        <!-- Ventas mes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-mes" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-20 mb-3"></div>
                <div class="h-8 bg-gray-200 rounded w-32"></div>
            </div>
        </div>
    </div>

    <!-- Row 2: Top products & Low stock -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Top 5 productos -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/top-productos" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-36 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
                <div class="h-3 bg-gray-200 rounded w-3/5"></div>
            </div>
        </div>

        <!-- Stock bajo -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/stock-bajo" hx-trigger="load, every 120s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-28 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
            </div>
        </div>
    </div>

    <!-- Row 3: Frequent customers & Revenue -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Clientes frecuentes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/clientes-frecuentes" hx-trigger="load, every 120s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-36 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-3/4"></div>
            </div>
        </div>

        <!-- Ingresos -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ingresos" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-32 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
            </div>
        </div>
    </div>

    <!-- Row 4: Margin & Dead stock -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Margen por categoria -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/margen-categoria" hx-trigger="load, every 120s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-36 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
            </div>
        </div>

        <!-- Productos sin rotacion -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/sin-rotacion" hx-trigger="load" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-40 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-3/4"></div>
            </div>
        </div>
    </div>

    <!-- Row 5: SQL Libre -->
    <div x-data="{ sqlOpen: false }">
        <button @click="sqlOpen = !sqlOpen" 
                class="flex items-center gap-2 text-sm text-indigo-600 hover:text-indigo-800 font-medium mb-3">
            <svg class="w-4 h-4 transition-transform" :class="sqlOpen ? 'rotate-90' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            Consulta SQL libre
        </button>

        <div x-show="sqlOpen" x-transition class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
            <form hx-post="/api/sql-libre" hx-target="#sql-results" hx-swap="innerHTML">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Escribe tu consulta SQL</label>
                    <textarea name="sql_query" rows="3" 
                              placeholder="SELECT p.nombre, p.stock_actual FROM productos p WHERE p.activo = 1 ORDER BY p.nombre"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none resize-y"></textarea>
                </div>
                <div class="flex items-center gap-3">
                    <button type="submit" 
                            class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700 transition-colors font-medium">
                        Ejecutar
                    </button>
                    <p class="text-xs text-gray-400">Solo SELECT · Max 100 filas · Timeout 5s · Read-only</p>
                </div>
            </form>
            <div id="sql-results" class="mt-4">
                <!-- Results appear here -->
            </div>
        </div>
    </div>
</div>
{{end}}
