{{define "content"}}
<div class="space-y-6">
    <!-- Row 1: Sales summary cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <!-- Ventas hoy -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-hoy" hx-trigger="load, every 30s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-20 mb-3"></div>
                <div class="h-8 bg-gray-200 rounded w-32"></div>
            </div>
        </div>

        <!-- Ventas semana -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-semana" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-24 mb-3"></div>
                <div class="h-8 bg-gray-200 rounded w-32"></div>
            </div>
        </div>

        <!-- Ventas mes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ventas-mes" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse">
                <div class="h-4 bg-gray-200 rounded w-20 mb-3"></div>
                <div class="h-8 bg-gray-200 rounded w-32"></div>
            </div>
        </div>
    </div>

    <!-- Row 2: Top products & Low stock -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Top 5 productos -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/top-productos" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-36 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
                <div class="h-3 bg-gray-200 rounded w-3/5"></div>
            </div>
        </div>

        <!-- Stock bajo -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/stock-bajo" hx-trigger="load, every 120s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-28 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
            </div>
        </div>
    </div>

    <!-- Row 3: Frequent customers & Revenue -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Clientes frecuentes -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/clientes-frecuentes" hx-trigger="load, every 120s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-36 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-3/4"></div>
            </div>
        </div>

        <!-- Ingresos 14 dias -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5"
             hx-get="/api/metrics/ingresos" hx-trigger="load, every 60s" hx-target="this" hx-swap="innerHTML">
            <div class="animate-pulse space-y-3">
                <div class="h-4 bg-gray-200 rounded w-32 mb-4"></div>
                <div class="h-3 bg-gray-200 rounded w-full"></div>
                <div class="h-3 bg-gray-200 rounded w-4/5"></div>
            </div>
        </div>
    </div>
</div>
{{end}}
