version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - revive

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*database/sql.Row).Scan
        - (*database/sql.Stmt).Close
        - (*database/sql.Tx).Rollback
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - (*encoding/json.Decoder).Decode
        - (*os.File).Close
    revive:
      rules:
        - name: exported
          arguments: [checkPrivateReceivers]
        - name: unused-parameter
    staticcheck:
      checks:
        - "all"
        - "-ST1003"
        - "-ST1005"
        - "-QF1003"
        - "-QF1012"

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      # Suppress package-comments for all packages
      - linters:
          - revive
        text: "package-comments"
      # Suppress unused-parameter for HTTP handlers (net/http interface requires both params)
      - linters:
          - revive
        text: "unused-parameter"
        path: "src/infrastructure/http/"
      # Suppress unused-parameter in test files
      - linters:
          - revive
        text: "unused-parameter"
        path: "_test\\.go"
      # Suppress unused-parameter in cmd/ (chi handlers)
      - linters:
          - revive
        text: "unused-parameter"
        path: "cmd/"
      # Suppress errcheck for Close calls
      - linters:
          - errcheck
        text: "Close"
      # Suppress errcheck for resp.Body.Close
      - linters:
          - errcheck
        text: "resp\\.Body\\.Close"
      # Suppress errcheck for Scan calls
      - linters:
          - errcheck
        text: "\\.Scan"
      # Suppress errcheck in test files
      - linters:
          - errcheck
        path: "_test\\.go"
      # Suppress exitAfterDefer in main packages (standard Go pattern)
      - linters:
          - gocritic
        text: "exitAfterDefer"
        path: "cmd/"
      # Suppress blank-imports (driver registration pattern)
      - linters:
          - revive
        text: "blank-imports"
      # Suppress exported const block comments for domain enums
      - linters:
          - revive
        text: "exported"
        path: "src/domain/entities/"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
